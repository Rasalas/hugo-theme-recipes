{{- with resources.Get "js/main.js" }}
  {{- if eq hugo.Environment "development" }}
    {{- with . | js.Build }}
      <script src="{{ .RelPermalink }}"></script>
    {{- end }}
  {{- else }}
    {{- $opts := dict "minify" true }}
    {{- with . | js.Build $opts | fingerprint }}
      <script src="{{ .RelPermalink }}" integrity="{{- .Data.Integrity }}" crossorigin="anonymous"></script>
    {{- end }}
  {{- end }}
{{- end }}

<script>
  // Recipe hash that changes when recipes are updated
  {{- $versions := slice -}}
  {{- range where site.RegularPages "Section" "recipe" -}}
    {{- $versions = $versions | append (printf "%s:%d" .RelPermalink .Lastmod.Unix) -}}
  {{- end -}}
  window.RECIPE_HASH = "{{ delimit $versions "|" | md5 }}";
</script>
