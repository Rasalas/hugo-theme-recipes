<div id="search-controls" class="hidden mb-6">
  <label for="search-tag-filter" class="text-sm font-medium mr-2">Nach Tag filtern</label>
  <select id="search-tag-filter" class="select select-bordered select-sm">
    <option value="">Alle Tags</option>
  </select>
  <span id="search-duration-control" class="hidden ml-4">
    <label for="search-duration-filter" class="text-sm font-medium mr-2">Maximale Dauer</label>
    <select id="search-duration-filter" class="select select-bordered select-sm">
      <option value="">Beliebig</option>
      <option value="30">Bis 30 Minuten</option>
      <option value="60">Bis 1 Stunde</option>
      <option value="120">Bis 2 Stunden</option>
    </select>
  </span>
</div>
<p id="search-status" class="sr-only" aria-live="polite" aria-atomic="true"></p>
