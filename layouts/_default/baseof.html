<!DOCTYPE html>
<html lang="{{ or site.Language.LanguageCode site.Language.Lang }}" dir="{{ or site.Language.LanguageDirection `ltr` }}">
<head>
  {{ partial "head.html" . }}
</head>
<body class="flex flex-col justify-between min-h-screen">
  <header class="site-header print:hidden">
    {{ partial "header.html" . }}
  </header>
  <main class="site-main">
    {{ block "main" . }}{{ end }}
  </main>
  <footer class="footer footer-center p-4 bg-base-200 text-base-content mt-auto print:hidden">
    {{ partial "footer.html" . }}
  </footer>
  {{ partial "search-dialog.html" . }}
  <script src="https://cdn.jsdelivr.net/npm/fuse.js@6.6.2"></script>
  <script src="/js/search-utils.js?v=3"></script>
  <script src="/js/search.js?v=4"></script>
  <script src="/js/tag-navigation.js"></script>
  <script src="/js/navbar.js?v=2"></script>
</body>
</html>
